<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Matanza Mascotas - Mis Mascotas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #24427d;
    --naranja: #e08127;
    --celeste: #13a1ba;
    --gris-bg: #f4f6fa;
    --gris-borde: #d1d5db;
    --gris-texto: #5a6478;
    --blanco: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--gris-bg);
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header { background: var(--azul); padding: 16px 0; position: relative; }
  .header-content {
    max-width: 1100px; margin: 0 auto; padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: relative;
  }
  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; color: var(--blanco); letter-spacing: 1.5px;
    text-decoration: none;
  }
  .brand span { color: var(--naranja); }
  .nav { display: flex; gap: 28px; }
  .nav a { color: var(--blanco); text-decoration: none; font-size: 14px; opacity: 0.85; }
  .nav a.activo { opacity: 1; font-weight: 600; }
  .nav a:hover { opacity: 1; }

  .main {
    flex: 1; max-width: 1100px; width: 100%;
    margin: 0 auto; padding: 48px 32px;
  }

  .section-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 32px;
    gap: 16px;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px; color: var(--azul); letter-spacing: 1px;
  }
  .btn-agregar {
    background: var(--naranja); color: var(--blanco);
    border: none; padding: 12px 22px; border-radius: 6px;
    font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; text-decoration: none; display: inline-block;
    white-space: nowrap;
  }
  .btn-agregar:hover { background: #c66f1f; }

  .mascotas-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
  }
  .card {
    background: var(--blanco); border-radius: 8px;
    padding: 20px; border: 1px solid var(--gris-borde);
    display: flex; gap: 16px; align-items: center;
    cursor: pointer; transition: border-color 0.2s, transform 0.2s;
    text-decoration: none; color: inherit;
    min-width: 0;
  }
  .card:hover { border-color: var(--celeste); transform: translateY(-2px); }
  .card.pendiente { border-left: 4px solid var(--naranja); }

  .mascota-foto {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--celeste);
    display: flex; align-items: center; justify-content: center;
    color: var(--blanco); font-size: 24px; flex-shrink: 0;
  }
  .mascota-foto.naranja { background: var(--naranja); }

  .mascota-nombre {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; color: var(--azul); letter-spacing: 0.5px;
    line-height: 1.1; margin-bottom: 4px;
    overflow-wrap: anywhere;
  }
  .mascota-estado { font-size: 13px; color: var(--gris-texto); }
  .mascota-estado.alerta { color: var(--naranja); font-weight: 500; }

  .footer {
    background: var(--azul); color: rgba(255,255,255,0.7);
    text-align: center; padding: 18px; font-size: 12px;
  }

  .btn-menu {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    z-index: 20;
  }
  .btn-menu span {
    display: block;
    width: 24px; height: 2px;
    background: var(--blanco);
    margin: 5px 0;
    border-radius: 2px;
    transition: transform 0.25s ease, opacity 0.25s ease;
  }
  .btn-menu.abierto span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .btn-menu.abierto span:nth-child(2) { opacity: 0; }
  .btn-menu.abierto span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  @media (max-width: 900px) {
    .mascotas-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 700px) {
    .header-content { padding: 0 20px; }
    .main { padding: 32px 20px; }

    .btn-menu { display: block; }

    .nav {
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: var(--azul);
      flex-direction: column;
      gap: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .nav.abierto { max-height: 260px; }
    .nav a {
      padding: 14px 20px;
      border-top: 1px solid rgba(255,255,255,0.12);
      opacity: 1;
    }

    .section-header {
      flex-direction: column;
      align-items: stretch;
      gap: 14px;
    }
    .section-title { font-size: 28px; }
    .btn-agregar {
      text-align: center;
      width: 100%;
      padding: 13px 22px;
    }

    .mascotas-grid {
      grid-template-columns: 1fr;
    }
  }

  /* Mobile chico */
  @media (max-width: 380px) {
    .card { padding: 16px; gap: 12px; }
    .mascota-foto { width: 48px; height: 48px; font-size: 20px; }
    .mascota-nombre { font-size: 18px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-content">
    <a href="home.html" class="brand">LA MATANZA <span>MASCOTAS</span></a>
    <nav class="nav" id="nav-principal">
      <a href="home.html" class="activo">Mis mascotas</a>
      <a href="calendario.html">Calendario</a>
      <a href="buscar-centro.html">Centros</a>
    </nav>
    <button class="btn-menu" id="btn-menu" aria-label="Abrir menú" aria-expanded="false" aria-controls="nav-principal">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>

<main class="main">
  <div class="section-header">
    <h1 class="section-title">MIS MASCOTAS</h1>
    <a href="formulario-paso-1.html" class="btn-agregar">+ Agregar mascota</a>
  </div>

  <div class="mascotas-grid">
    <a href="calendario.html" class="card">
      <div class="mascota-foto">🐶</div>
      <div>
        <div class="mascota-nombre">ROCKY</div>
        <div class="mascota-estado">Al día</div>
      </div>
    </a>

    <a href="alerta.html" class="card pendiente">
      <div class="mascota-foto naranja">🐱</div>
      <div>
        <div class="mascota-nombre">MICHI</div>
        <div class="mascota-estado alerta">Vacuna pendiente</div>
      </div>
    </a>

    <a href="calendario.html" class="card">
      <div class="mascota-foto">🐕</div>
      <div>
        <div class="mascota-nombre">LUNA</div>
        <div class="mascota-estado">Al día</div>
      </div>
    </a>
  </div>
</main>

<footer class="footer">
  Municipio de La Matanza · 2026
</footer>

<script>
  const btnMenu = document.getElementById('btn-menu');
  const nav = document.getElementById('nav-principal');

  btnMenu.addEventListener('click', () => {
    const abierto = nav.classList.toggle('abierto');
    btnMenu.classList.toggle('abierto', abierto);
    btnMenu.setAttribute('aria-expanded', abierto);
  });


  nav.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      nav.classList.remove('abierto');
      btnMenu.classList.remove('abierto');
      btnMenu.setAttribute('aria-expanded', 'false');
    });
  });

  document.addEventListener('click', (e) => {
    if (!nav.contains(e.target) && !btnMenu.contains(e.target)) {
      nav.classList.remove('abierto');
      btnMenu.classList.remove('abierto');
      btnMenu.setAttribute('aria-expanded', 'false');
    }
  });
</script>

</body>
</html>
