<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Matanza Mascotas - Registro de Usuario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --azul: #24427d;
      --naranja: #e08127;
      --celeste: #13a1ba;
      --gris-bg: #e5e5e5;
      --gris-borde: #d1d5db;
      --gris-texto: #5a6478;
      --blanco: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--gris-bg);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header { background: var(--azul); padding: 16px 0; }
    .header-content {
      max-width: 1100px; margin: 0 auto; padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; color: var(--blanco); letter-spacing: 1.5px;
      text-decoration: none;
    }
    .brand span { color: var(--naranja); }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      background: var(--blanco);
    }

    /* Ampliamos el ancho de la tarjeta para desktop */
    .login-card {
      max-width: 760px;
      width: 100%;
      text-align: center;
    }

    .titulo {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 24px;
      color: var(--gris-texto);
      margin-bottom: 32px;
    }

    /* Contenedor Grid para las dos columnas */
    .form-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 32px; /* 0 vertical, 32px horizontal */
    }

    .form-group {
      display: flex; flex-direction: column;
      text-align: left;
      margin-bottom: 20px;
    }

    .form-group label {
      font-size: 12px; color: var(--gris-texto);
      margin-bottom: 6px; font-weight: 500;
    }

    .form-group input,
    .form-group select {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--gris-borde); border-radius: 4px;
      font-family: 'Poppins', sans-serif; font-size: 14px;
      background: var(--blanco); color: #1f2937;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none; border-color: var(--celeste);
    }

    /* Contenedor para centrar el botón en desktop y no se estire de más */
    .form-acciones {
      max-width: 400px;
      margin: 12px auto 0 auto;
    }

    .btn {
      padding: 12px 24px; border-radius: 4px;
      font-family: 'Poppins', sans-serif; font-size: 14px;
      font-weight: 500; cursor: pointer; border: none;
      text-decoration: none; display: inline-block; text-align: center;
      width: 100%;
    }

    .btn-primary { background: var(--naranja); color: var(--blanco); }
    .btn-primary:hover { background: #c66f1f; }

    .link-footer {
      margin-top: 24px;
      font-size: 13px;
      color: var(--gris-texto);
    }

    .link-footer a {
      color: var(--gris-texto);
      text-decoration: none;
      font-weight: 500;
    }
    .link-footer a:hover {
      color: var(--azul);
      text-decoration: underline;
    }
    
    .footer {
      background: var(--azul); color: rgba(255,255,255,0.7);
      text-align: center; padding: 18px; font-size: 12px;
    }
    /* Media Query para devolverlo a una columna en Mobile */
    @media (max-width: 768px) {
      .login-card {
        max-width: 400px;
      }
      .form-columns {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>
<body>

<header class="header">
  <div class="header-content">
    <a href="#" class="brand">LA MATANZA <span>MASCOTAS</span></a>
  </div>
</header>

<main class="main">
  <div class="login-card">
    <h1 class="titulo">Registrarse</h1>

    <form action="#" method="POST">

      <div class="form-columns">
        <div class="columna">
          <div class="form-group">
            <label>Nombre completo</label>
            <input type="text" placeholder="Ingresá tu nombre completo" required>
          </div>

          <div class="form-group">
            <label>DNI</label>
            <input type="number" placeholder="Sin puntos ni espacios" required>
          </div>

          <div class="form-group">
            <label>Localidad</label>
            <select required>
              <option value="" disabled selected>Seleccioná tu localidad</option>
              <option value="Aldo Bonzi">Aldo Bonzi</option>
              <option value="Ciudad Evita">Ciudad Evita</option>
              <option value="Ciudad Madero">Ciudad Madero</option>
              <option value="González Catán">González Catán</option>
              <option value="Gregorio de Laferrere">Gregorio de Laferrere</option>
              <option value="Isidro Casanova">Isidro Casanova</option>
              <option value="La Tablada">La Tablada</option>
              <option value="Lomas del Mirador">Lomas del Mirador</option>
              <option value="Rafael Castillo">Rafael Castillo</option>
              <option value="Ramos Mejía">Ramos Mejía</option>
              <option value="San Justo">San Justo</option>
              <option value="Tapiales">Tapiales</option>
              <option value="Veinte de Junio">Veinte de Junio</option>
              <option value="Villa Celina">Villa Celina</option>
              <option value="Villa Luzuriaga">Villa Luzuriaga</option>
            </select>
          </div>
        </div>

        <div class="columna">
          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="ejemplo@correo.com" required>
          </div>

          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" placeholder="Creá una contraseña" required>
          </div>

          <div class="form-group">
            <label>Repetir contraseña</label>
            <input type="password" placeholder="Confirmá tu contraseña" required>
          </div>
        </div>
      </div>

      <div class="form-acciones">
        <a href="inicio-de-sesion.html" class="btn btn-primary">Crear cuenta</a>

        <div class="link-footer">
          ¿Ya tenés cuenta? <a href="inicio-de-sesion.html">Iniciar sesión</a>
        </div>
      </div>

    </form>
  </div>
</main>
<footer class="footer">
  Municipio de La Matanza · 2026
</footer>

</body>
</html>
