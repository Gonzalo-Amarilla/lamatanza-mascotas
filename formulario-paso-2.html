<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Matanza Mascotas - Registrar Mascota</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul: #24427d;
            --naranja: #e08127;
            --celeste: #13a1ba;
            --gris-bg: #f4f6fa;
            --gris-borde: #d1d5db;
            --gris-texto: #5a6478;
            --blanco: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--blanco);
            color: #1f2937;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .header {
            background: var(--azul); padding: 16px 0;
            position: relative;
        }
        .header-content {
            max-width: 1100px; margin: 0 auto; padding: 0 32px;
            display: flex; align-items: center; justify-content: space-between;
            position: relative;
        }
        .brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px; color: var(--blanco); letter-spacing: 1.5px;
            text-decoration: none;
        }
        .brand span { color: var(--naranja); }
        .nav { display: flex; gap: 28px; }
        .nav a { color: var(--blanco); text-decoration: none; font-size: 14px; opacity: 0.85; }
        .nav a.activo { opacity: 1; font-weight: 600; }
        .nav a:hover { opacity: 1; }

        .volver-wrapper {
            max-width: 1100px; margin: 0 auto; width: 100%;
            padding: 24px 32px 0;
        }
        .volver { color: var(--gris-texto); font-size: 13px; text-decoration: none; }
        .volver:hover { color: var(--azul); }

        .main {
            flex: 1; max-width: 720px; width: 100%;
            margin: 0 auto; padding: 16px 32px 48px;
        }

        .titulo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px; color: var(--azul); letter-spacing: 1px;
            text-align: center; margin-bottom: 6px;
        }
        .subtitulo {
            text-align: center; color: var(--gris-texto);
            font-size: 13px; margin-bottom: 20px;
        }

        /* Indicador de pasos (Stepper) actualizado para 3 pasos */
        .indicador-pasos {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 36px;
        }
        .paso-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--gris-texto);
        }
        .paso-item.activo {
            color: var(--azul);
            font-weight: 600;
        }
        .paso-numero {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--gris-bg);
            border: 1px solid var(--gris-borde);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--gris-texto);
            transition: all 0.3s ease;
        }
        .paso-item.completado .paso-numero {
            background: var(--gris-bg);
            color: var(--azul);
            border-color: var(--azul);
        }
        .paso-item.activo .paso-numero {
            background: var(--azul);
            color: var(--blanco);
            border-color: var(--azul);
        }
        .paso-linea {
            width: 30px;
            height: 2px;
            background: var(--gris-borde);
        }
        .paso-linea.completada {
            background: var(--azul);
        }

        .seccion { margin-bottom: 36px; }
        .seccion-titulo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px; color: var(--azul); letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label {
            font-size: 13px; color: var(--gris-texto);
            margin-bottom: 6px; font-weight: 500;
        }
        .form-group input[type="text"],
        .form-group select {
            width: 100%; padding: 9px 12px;
            border: 1px solid var(--gris-borde); border-radius: 4px;
            font-family: 'Poppins', sans-serif; font-size: 14px;
            background: var(--blanco); color: #1f2937;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: var(--celeste);
        }

        .radio-group { display: flex; gap: 20px; padding-top: 4px; }
        .radio-group label {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; color: #1f2937; cursor: pointer;
            font-weight: 400; margin-bottom: 0;
        }

        /* Checklist container */
        .checklist-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 8px;
            background: var(--gris-bg);
            padding: 20px;
            border-radius: 6px;
            border: 1px solid var(--gris-borde);
        }
        .checklist-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .check-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #1f2937;
            cursor: pointer;
        }
        .check-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .checklist-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 24px;
            font-size: 13px;
            color: var(--gris-texto);
        }
        .checklist-input-group span {
            white-space: nowrap;
        }
        .checklist-input-group input[type="text"] {
            flex: 1;
            padding: 7px 12px;
            border: 1px solid var(--gris-borde);
            border-radius: 4px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            background: var(--blanco);
            transition: all 0.2s ease;
        }
        .checklist-input-group input[type="text"]:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
            border-color: #d1d5db;
        }

        .botones {
            display: flex; justify-content: center; gap: 12px; margin-top: 32px;
        }
        .btn {
            padding: 11px 24px; border-radius: 4px;
            font-family: 'Poppins', sans-serif; font-size: 13px;
            font-weight: 500; cursor: pointer; border: none;
            text-decoration: none; display: inline-block; text-align: center;
        }
        .btn-primary { background: var(--naranja); color: var(--blanco); }
        .btn-primary:hover { background: #c66f1f; }
        .btn-secundario {
            background: var(--blanco); color: var(--azul);
            border: 1.5px solid var(--azul);
        }
        .btn-secundario:hover { background: var(--azul); color: var(--blanco); }

        .nota-final {
            text-align: center; color: var(--gris-texto);
            font-size: 12px; margin-top: 16px;
        }

        .footer {
            background: var(--azul); color: rgba(255,255,255,0.7);
            text-align: center; padding: 18px; font-size: 12px;
            margin-top: 48px;
        }
        
        .btn-menu {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px;
        z-index: 20;
    }
    .btn-menu span {
        display: block;
        width: 24px; height: 2px;
        background: var(--blanco);
        margin: 5px 0;
        border-radius: 2px;
        transition: transform 0.25s ease, opacity 0.25s ease;
    }
    .btn-menu.abierto span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .btn-menu.abierto span:nth-child(2) { opacity: 0; }
    .btn-menu.abierto span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        @media (max-width: 768px) {
            .volver-wrapper { padding: 16px 16px 0; }
            .main { padding: 16px 16px 48px; }
            .titulo { font-size: 26px; }
            .form-grid { grid-template-columns: 1fr; }
            .radio-group { flex-direction: column; align-items: flex-start; gap: 12px; }
            .botones { flex-direction: column; gap: 16px; }
            .btn { width: 100%; }
        }


  @media (max-width: 700px) {
    .btn-menu { display: block; }

    .nav {
      position: absolute;
      top: 100%; left: 0; right: 0;
      background: var(--azul);
      flex-direction: column;
      gap: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .nav.abierto { max-height: 260px; }
    .nav a {
      padding: 14px 32px;
      border-top: 1px solid rgba(255,255,255,0.12);
      opacity: 1;
    }
  }
    </style>
</head>
<body>

<header class="header">
  <div class="header-content">
    <a href="home.html" class="brand">LA MATANZA <span>MASCOTAS</span></a>
    <nav class="nav" id="nav-principal">
      <a href="home.html" class="activo">Mis mascotas</a>
      <a href="calendario.html">Calendario</a>
      <a href="buscar-centro.html">Centros</a>
    </nav>
    <button class="btn-menu" id="btn-menu" aria-label="Abrir menú" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>

<div class="volver-wrapper">
    <a href="formulario-paso-1.html" class="volver">← Volver al paso anterior</a>
</div>

<main class="main">
    <h1 class="titulo">REGISTRAR MASCOTA</h1>
    <p class="subtitulo">Información adicional de salud.</p>

    <!-- STEPPER CON JS (Paso 2 activo de 3) -->
    <div class="indicador-pasos" id="stepper">
        <div class="paso-item completado" data-step="1">
            <div class="paso-numero">✓</div>
            <span style="display:none;">Datos básicos</span>
        </div>
        <div class="paso-linea completada"></div>
        <div class="paso-item activo" data-step="2">
            <div class="paso-numero">2</div>
            <span>Salud</span>
        </div>
        <div class="paso-linea"></div>
        <div class="paso-item" data-step="3">
            <div class="paso-numero">3</div>
            <span style="display:none;">Vacunas</span>
        </div>
    </div>

    <div>
        <!-- SECCIÓN INFORMACIÓN ADICIONAL -->
        <div class="seccion">
            <h2 class="seccion-titulo">INFORMACIÓN ADICIONAL</h2>

            <div class="form-grid">
                <div class="form-group full">
                    <label>¿Está castrado/a?</label>
                    <div class="radio-group">
                        <label><input type="radio" name="castrado"> Sí</label>
                        <label><input type="radio" name="castrado"> No</label>
                        <label><input type="radio" name="castrado"> No sé</label>
                    </div>
                </div>

                <div class="form-group full">
                    <label>Observaciones importantes (alergias, enfermedades, medicación, etc.)</label>

                    <div class="checklist-container">
                        <div class="checklist-item">
                            <label class="check-label">
                                <input type="checkbox" id="check-alergias" onchange="toggleInput('check-alergias', 'input-alergias')"> Tiene alergias conocidas
                            </label>
                            <div class="checklist-input-group">
                                <span>¿Cuáles?</span>
                                <input type="text" id="input-alergias" disabled placeholder="Completar detalles...">
                            </div>
                        </div>

                        <div class="checklist-item">
                            <label class="check-label">
                                <input type="checkbox" id="check-cronica" onchange="toggleInput('check-cronica', 'input-cronica')"> Tiene una enfermedad crónica
                            </label>
                            <div class="checklist-input-group">
                                <span>¿Cuál?</span>
                                <input type="text" id="input-cronica" disabled placeholder="Completar detalles...">
                            </div>
                        </div>

                        <div class="checklist-item">
                            <label class="check-label">
                                <input type="checkbox" id="check-medicacion" onchange="toggleInput('check-medicacion', 'input-medicacion')"> Está bajo medicación permanente
                            </label>
                            <div class="checklist-input-group">
                                <span>¿Cuál?</span>
                                <input type="text" id="input-medicacion" disabled placeholder="Completar detalles...">
                            </div>
                        </div>

                        <div class="checklist-item">
                            <label class="check-label">
                                <input type="checkbox" id="check-cirugia" onchange="toggleInput('check-cirugia', 'input-cirugia')"> Fue sometido/a a una cirugía importante
                            </label>
                            <div class="checklist-input-group">
                                <span>¿Cuál?</span>
                                <input type="text" id="input-cirugia" disabled placeholder="Completar detalles...">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="botones">
            <a href="formulario-paso-1.html" class="btn btn-secundario">Atrás</a>
            <a href="formulario-paso-3.html" class="btn btn-primary">Siguiente</a>
        </div>
    </div>
</main>

<footer class="footer">
    Municipio de La Matanza · 2026
</footer>

<script>
    function toggleInput(checkboxId, inputId) {
        const checkbox = document.getElementById(checkboxId);
        const input = document.getElementById(inputId);
        if (checkbox && input) {
            input.disabled = !checkbox.checked;
            if (checkbox.checked) {
                input.focus();
            } else {
                input.value = '';
            }
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        const pasoActivo = document.querySelector('.paso-item.activo');
        if (pasoActivo) {
            console.log("Paso Activo: " + pasoActivo.getAttribute('data-step') + " / 3");
        }
    });

    const btnMenu = document.getElementById('btn-menu');
    const navPrincipal = document.getElementById('nav-principal');

    btnMenu.addEventListener('click', () => {
    const abierto = navPrincipal.classList.toggle('abierto');
    btnMenu.classList.toggle('abierto', abierto);
    btnMenu.setAttribute('aria-expanded', abierto);
    });
    navPrincipal.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      navPrincipal.classList.remove('abierto');
      btnMenu.classList.remove('abierto');
      btnMenu.setAttribute('aria-expanded', 'false');
    });
  });
</script>
</body>
</html>
